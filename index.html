<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE MULTIVERSE OF LOVE | KHANG ❤️ HỒNG ANH</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Orbitron:wght@400;900&family=Quicksand:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #fcc201;
            --love-pink: #ff4d6d;
            --vn-red: #da251d;
            --tw-blue: #002952;
            --space: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { height: 100vh; background: var(--space); overflow: hidden; font-family: 'Quicksand', sans-serif; color: white; touch-action: none; }

        /* NỀN VŨ TRỤ */
        canvas#space-canvas { position: fixed; inset: 0; z-index: -1; }

        /* 1. HỆ THỐNG RADAR "NHỊP ĐẬP 2 PHƯƠNG" */
        .radar-container {
            position: relative; width: 280px; height: 180px;
            background: rgba(255, 255, 255, 0.05); border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1); display: flex; 
            flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden; margin-bottom: 20px;
        }
        .radar-line {
            position: absolute; width: 100%; height: 2px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
            top: 0; animation: scan 3s linear infinite;
        }
        @keyframes scan { from { top: 0; } to { top: 100%; } }

        .location-group { display: flex; gap: 40px; z-index: 2; }
        .loc-dot { text-align: center; position: relative; }
        .dot { 
            width: 12px; height: 12px; background: var(--gold); border-radius: 50%; 
            margin: 0 auto 8px; box-shadow: 0 0 15px var(--gold);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }

        /* 2. MAGIC TOUCH (HOA ĐÀO & HOA SEN) */
        .magic-particle {
            position: absolute; pointer-events: none; z-index: 9999;
            animation: magic-float 1.2s ease-out forwards;
        }
        @keyframes magic-float {
            0% { transform: translateY(0) rotate(0); opacity: 1; scale: 1; }
            100% { transform: translateY(-120px) rotate(360deg); opacity: 0; scale: 1.5; }
        }

        /* 3. LỊCH VẠN NIÊN 3D */
        .calendar-3d {
            text-align: center; margin-bottom: 25px;
        }
        .days-count {
            font-family: 'Orbitron'; font-size: 5.5rem; font-weight: 900;
            background: linear-gradient(180deg, #fff, var(--gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(252, 194, 1, 0.4)); line-height: 1;
        }

        /* 4. THÁNH CHỈ HOLOGRAM 3D */
        .hologram-scroll {
            width: 320px; height: 160px;
            background: linear-gradient(135deg, #800f2f, #ff4d6d);
            border: 2px solid var(--gold); border-radius: 10px;
            cursor: pointer; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            box-shadow: 0 10px 40px rgba(255, 77, 109, 0.4);
            position: relative; transition: 0.5s;
        }
        .hologram-scroll:hover { transform: translateY(-10px) rotateX(10deg); }

        /* OVERLAY MỞ SỚ */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; justify-content: center; align-items: center; z-index: 10001;
        }
        .scroll-3d {
            background: #fdf0d5; width: 90%; max-width: 420px;
            padding: 40px 30px; border-radius: 4px;
            border-left: 12px solid #800f2f; border-right: 12px solid #800f2f;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 0 50px rgba(0,0,0,0.1);
            transform: rotateX(20deg) scale(0.8); opacity: 0; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .scroll-3d.active { transform: rotateX(0deg) scale(1); opacity: 1; }

        .btn-confirm {
            margin-top: 25px; background: #800f2f; color: var(--gold);
            border: 1px solid var(--gold); padding: 10px 30px; border-radius: 25px;
            font-family: 'Orbitron'; font-size: 0.8rem; cursor: pointer;
        }
    </style>
</head>
<body onclick="magicTouch(event)">

    <canvas id="space-canvas"></canvas>
    <audio id="bgm" loop><source src="https://files.catbox.moe/6qjxys" type="audio/mpeg"></audio>

    <div id="gate" style="position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <div onclick="unlock()" style="width: 120px; height: 120px; border: 2px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 0 30px var(--gold);">
            <i class="fa-solid fa-crown" style="color: var(--gold); font-size: 3rem;"></i>
        </div>
        <h2 style="color: white; margin-top: 30px; font-family: 'Orbitron'; letter-spacing: 5px; font-size: 0.7rem;">GỬI HỒNG ANH ❤️</h2>
    </div>

    <div id="main-app" style="display: none; opacity: 0; flex-direction: column; align-items: center; justify-content: center; height: 100vh; transition: 2s;">
        
        <div class="radar-container">
            <div class="radar-line"></div>
            <div class="location-group">
                <div class="loc-dot">
                    <div class="dot" style="background: var(--love-pink);"></div>
                    <span style="font-size: 0.6rem; font-family: 'Orbitron';">VIỆT NAM (ANH)</span>
                    <div id="vn-time" style="font-size: 0.8rem; font-family: 'Orbitron'; margin-top: 5px;">00:00</div>
                </div>
                <i class="fa-solid fa-heart-pulse" style="color: var(--love-pink); align-self: center; animation: pulse 1s infinite;"></i>
                <div class="loc-dot">
                    <div class="dot" style="background: #00ffcc;"></div>
                    <span style="font-size: 0.6rem; font-family: 'Orbitron';">TAIWAN (EM)</span>
                    <div id="tw-time" style="font-size: 0.8rem; font-family: 'Orbitron'; margin-top: 5px;">00:00</div>
                </div>
            </div>
        </div>

        <div class="calendar-3d">
            <p style="color: var(--gold); font-family: 'Orbitron'; letter-spacing: 4px; font-size: 0.7rem;">NGÀY HỒNG ANH HẠNH PHÚC</p>
            <div id="days" class="days-count">0</div>
            <p id="full-date" style="font-family: 'Orbitron'; font-size: 1rem; letter-spacing: 2px; margin-top: 10px;">05 . 05 . 2026</p>
        </div>

        <div class="hologram-scroll" onclick="openHolyDecree()">
            <i class="fa-solid fa-scroll" style="color: var(--gold); font-size: 2.5rem; margin-bottom: 10px;"></i>
            <span style="font-family: 'Orbitron'; color: var(--gold); font-weight: 900; letter-spacing: 2px;">THIÊN ĐÌNH CÓ CHỈ</span>
            <span style="font-size: 0.7rem; opacity: 0.8;">HỒNG ANH TIẾP CHỈ!</span>
        </div>

        <p style="margin-top: 30px; font-size: 0.6rem; letter-spacing: 5px; opacity: 0.5; font-family: 'Orbitron';">MADE BY KHANG ❤️ 2026
        Nhà Xuất Bản Khangpanh68</p>
    </div>

    <div id="overlay" class="overlay" onclick="closeHolyDecree()">
        <div class="scroll-3d" id="scroll-box">
            <h2 style="font-family: 'Dancing Script'; color: #800f2f; font-size: 2.5rem; border-bottom: 1px solid #ddd; margin-bottom: 20px;">Gửi Hồng Anh ❤️</h2>
            <p id="wish-text" style="color: #333; font-size: 1.15rem; line-height: 1.7; font-weight: 600;"></p>
            <div style="margin-top: 30px; font-family: 'Dancing Script'; font-size: 1.5rem; color: #800f2f; text-align: right;">— Khang trân bút —</div>
            <center><button class="btn-confirm">TUÂN CHỈ!</button></center>
        </div>
    </div>

    <script>
        // BACKGROUND SPACE CANVAS
        const canvas = document.getElementById('space-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for(let i=0; i<150; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    speed: Math.random() * 0.5
                });
            }
        }

        function drawStars() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "white";
            stars.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
                ctx.fill();
                s.y += s.speed;
                if(s.y > canvas.height) s.y = 0;
            });
            requestAnimationFrame(drawStars);
        }

        // MAGIC TOUCH 2.0
        function magicTouch(e) {
            const symbols = ['🌸', '💮', '💖', '✨']; // Hoa đào, hoa sen, tim, sao
            for(let i=0; i<5; i++) {
                const p = document.createElement('div');
                p.className = 'magic-particle';
                p.innerText = symbols[Math.floor(Math.random()*symbols.length)];
                p.style.left = e.clientX + 'px';
                p.style.top = e.clientY + 'px';
                p.style.fontSize = Math.random() * 20 + 15 + 'px';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 1200);
            }
        }

        function unlock() {
            document.getElementById('bgm').play();
            document.getElementById('gate').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                setTimeout(() => document.getElementById('main-app').style.opacity = '1', 50);
                initStars();
                drawStars();
                updateAll();
            }, 1000);
        }

        function updateAll() {
            // Cập nhật đồng hồ 2 phương
            const now = new Date();
            const vnTime = new Intl.DateTimeFormat('en-GB', { timeStyle: 'short', timeZone: 'Asia/Ho_Chi_Minh' }).format(now);
            const twTime = new Intl.DateTimeFormat('en-GB', { timeStyle: 'short', timeZone: 'Asia/Taipei' }).format(now);
            document.getElementById('vn-time').innerText = vnTime;
            document.getElementById('tw-time').innerText = twTime;

            // Cập nhật ngày tháng
            const d = String(now.getDate()).padStart(2,'0');
            const m = String(now.getMonth()+1).padStart(2,'0');
            document.getElementById('full-date').innerText = `${d} . ${m} . ${now.getFullYear()}`;

            // Cập nhật ngày yêu
            const start = new Date('2023-01-21'); 
            const diff = Math.floor((now - start) / (1000 * 60 * 60 * 24));
            document.getElementById('days').innerText = diff;
        }
        setInterval(updateAll, 1000);

        function openHolyDecree() {
            const hour = new Date().getHours();
            let wish = "";
            if(hour < 11) wish = "Thiên đình có chỉ: Hồng Anh buổi sáng dậy sớm dùng bữa, giữ gìn long thể, một ngày đại cát đại lợi nhé!";
            else if(hour < 14) wish = "Sớ quân báo về: Hồng Anh nhớ dùng bữa trưa thật ngon, nghỉ ngơi tĩnh dưỡng để chiều còn yêu anh tiếp nhé!";
            else if(hour < 18) wish = "Tin từ tinh tú: Chiều nay làm việc hăng say nhé tiên nữ của anh, ta luôn dõi theo nàng từ phía sau!";
            else wish = "Chỉ dụ tối muộn: Hồng Anh đắp chăn cẩn thận, ngủ một giấc thật ngon và nhớ phải mơ về ta nhé! G9 ❤️";

            document.getElementById('wish-text').innerText = wish;
            document.getElementById('overlay').style.display = 'flex';
            setTimeout(() => document.getElementById('scroll-box').classList.add('active'), 50);
        }

        function closeHolyDecree() {
            document.getElementById('scroll-box').classList.remove('active');
            setTimeout(() => document.getElementById('overlay').style.display = 'none', 500);
        }
    </script>
</body>
</html>
